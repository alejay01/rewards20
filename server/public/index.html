    <script>
      // Unregister any active PWA service workers and clear all browser cache storage to resolve aggressive Chrome caching
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then(registrations => {
          for (const registration of registrations) {
            registration.unregister().then(success => {
              if (success) {
                console.log("Service Worker successfully unregistered and deleted.");
                // Hard reload the page after unregistering to ensure clean fetch from network
                window.location.reload();
              }
            });
          }
        });
      }

      if ("caches" in window) {
        caches.keys().then(keys => {
          for (const key of keys) {
            caches.delete(key).then(() => {
              console.log("Cache storage cleared: ", key);
            });
          }
        });
      }
    </script>
